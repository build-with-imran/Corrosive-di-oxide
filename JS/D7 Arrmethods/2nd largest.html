<script>
let arr = [10, 25, 5, 40, 30];

let largest = -Infinity;
let secondLargest = -Infinity;

for (let i = 0; i < arr.length; i++) {
    let num = arr[i];

    if (num > largest) {
        secondLargest = largest;
        largest = num;
    } 
    else if (num > secondLargest && num !== largest) {
        secondLargest = num;
    }
}

console.log("Second Largest Number:", secondLargest);
</script>
