<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service</title>
    <link rel="stylesheet" href="form.css">
    <link rel="icon" type="png" href="Assests/logo.png ">
</head>
<div class="logo">
<img  class="logo" src="Assests/logo.png" alt="logo" width="200px">
</div>
<div class="form-container">
    <form action="thanks.html" class="form-grid">


    <div class="form-left">

        <input type="text" placeholder="Your Name" required>
        <input type="tel" placeholder="Mobile Number" required>

        <select required>
            <option value="">Select Service</option>
            <option>Petrol / Puncture</option>
            <option>Mechanical Service</option>
            <option>Towing Service</option>
        </select>

        <select required>
            <option value="">Vehicle Type</option>
            <option>Bike</option>
            <option>Car</option>
            <option>Truck</option>
        </select>

        <input type="text" placeholder="Vehicle Number" required>

    </div>
    

    
    <div class="form-right">

        <input type="text" placeholder="Location" required>
        <textarea placeholder="Full Address" required></textarea>

        <select>
            <option>Yourself</option>
            <option>Someone Else</option>
        </select>

        <input type="tel" placeholder="Other Person Mobile (if applicable)">

        <select>
            <option value="">Emergency Level</option>
            <option>Normal</option>
            <option>Urgent</option>
        </select>
     
    </div>
        <div class="form-full terms-row">
    <input type="checkbox" id="terms" required>
    <label for="terms">I agree to terms & conditions</label>
</div>


    
    <div class="form-full">
        <button type="submit" class="btn">Submit Request</button>
    </div>

    </form>
</div>
