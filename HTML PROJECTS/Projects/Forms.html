<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form >
        <label for="Name">Enter Your Name</label>
        <input type="text" placeholder="Start With Capital Letter "> <br/><br/>
        <label for="Age">Enter Your number</label>
        <input type="number" min=18 placeholder="select the age" >
        <br/><br/>
        <label for="Mobile">Enter Your Number</label>
        <input type="tel" minlength="10" placeholder="Enter Valid Mobile Number" required>
        <br/><br/>
        <label for="type something">Type something</label>
        <input type="text" placeholder="whats on your mind" required>
        <br/><br/>
        <label for="Read this">Please read carefully</label>
        <input type="text" value="rajasekar saagurapo dayal uh kaadhula " readonly>
        <br/><br/>
        <label for="Onnum illa">Onnum illa keela poturu</label>
        <input type="text" placeholder="Onnumay illa" disabled>
        <br/><br/>
        <label for="email">Enter Your Mail-id</label>
        <input type="text" placeholder="Enter Valid mail id" required> <br/><br/>
        
        <label for="password">Enter Your password</label>
        <input type="password" placeholder="Enter your password" required><br/><br/>
        <input type="datetime">
        <input type="datetime-local">
        <br/><br/><input type="submit" value="Register">
        <br/><br/><textarea name="" id=""></textarea>
    </form>
</body>
</html>
