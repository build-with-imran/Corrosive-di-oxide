<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
 <link rel="stylesheet" href="register.css">
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md fade-in">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-indigo-600 mb-4">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-white-200">Create your account</h1>
      <p class="text-slate-500 text-sm mt-1">Join us today!</p>
    </div>

    <!-- Card -->
    <div id="formCard" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">

      <form id="registerForm" novalidate>

        <!-- Full Name -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="fullname">Full Name</label>
          <input
            id="fullname"
            type="text"
            placeholder="John Doe"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
          <p id="fullname-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="email">Email Address</label>
          <input
            id="email"
            type="email"
            placeholder="john@example.com"
            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
          <p id="email-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="password">Password</label>
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="Min. 8 characters"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition pr-12"
            />
            <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="password-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="confirmPassword">Confirm Password</label>
          <div class="relative">
            <input
              id="confirmPassword"
              type="password"
              placeholder="Repeat your password"
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-slate-800 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition pr-12"
            />
            <button type="button" onclick="togglePassword('confirmPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="confirmPassword-error" class="text-red-500 text-xs mt-1 hidden"></p>
        </div>

        <!-- Terms checkbox -->
        <div class="flex items-start gap-3 mb-2">
          <input id="terms" type="checkbox" class="mt-0.5 w-4 h-4 accent-indigo-600 cursor-pointer"/>
          <label for="terms" class="text-sm text-slate-500 cursor-pointer">
            I agree to the <a href="#" class="text-indigo-600 hover:underline">Terms of Service</a> and <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>
          </label>
        </div>
        <p id="terms-error" class="text-red-500 text-xs mb-4 hidden"></p>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-medium py-2.5 px-4 rounded-xl text-sm transition-all duration-150"
        >
          Create Account
        </button>

        <!-- Success message (hidden by default) -->
        <div id="successMsg" class="hidden mt-4 text-center text-sm text-green-600 bg-green-50 border border-green-200 rounded-xl py-3 px-4">
          Account created successfully! Redirecting to login...
        </div>

      </form>
    </div>

    <!-- Login link -->
    <p class="text-center text-sm text-slate-500 mt-6">
      Already have an account?
      <a href="login.html" class="text-indigo-600 font-medium hover:underline ml-1">Sign in</a>
    </p>

  </div>

  <script src="register.js">
   
  </script>

</body>
</html>
